<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cold Chain WebSocket Test</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f0f0; }
        #log { background: #000; color: #0f0; padding: 15px; border-radius: 5px; height: 300px; overflow-y: scroll; font-family: monospace; }
        .success { color: #00ff00; }
    </style>
</head>
<body>
    <h1>WebSocket Real-Time Test</h1>
    <p>Status: <span id="status">Connecting...</span></p>
    <div id="log"></div>

    <script>
        const log = document.getElementById('log');
        const status = document.getElementById('status');
        
        // 1. Create the connection
        const ws = new WebSocket("ws://127.0.0.1:8000/ws");

        // 2. Handle connection opening
        ws.onopen = () => {
            status.innerText = "Connected! Waiting for data...";
            status.style.color = "green";
            console.log("WebSocket connected!");
        };

        // 3. Handle incoming messages
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            console.log("New Reading:", data);
            
            // Add to our on-screen log
            const entry = document.createElement('div');
            entry.innerHTML = `<span class="success">[${data.timestamp}]</span> ${data.sensor_id}: ${data.temperature_c}°C | Rolling Avg: ${data.rolling_mean}°C`;
            log.appendChild(entry);
            
            // Auto-scroll to bottom
            log.scrollTop = log.scrollHeight;
        };

        // 4. Handle errors or closing
        ws.onerror = (error) => {
            status.innerText = "Error!";
            status.style.color = "red";
        };
        
        ws.onclose = () => {
            status.innerText = "Disconnected.";
            status.style.color = "gray";
        };
    </script>
</body>
</html>
